<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sovereign Capital - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { -webkit-tap-highlight-color: transparent; background-color: #000; color: white; }
        .bg-gold { background-color: #D4AF37; }
        .text-gold { color: #D4AF37; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-status { padding: 8px 12px; border-radius: 12px; font-size: 10px; font-weight: bold; text-transform: uppercase; border: 1px solid #334155; transition: all 0.3s; }
        .status-activo.active { background: #22c55e; color: #000; border-color: #22c55e; }
        .status-atraso.active { background: #eab308; color: #000; border-color: #eab308; }
        .status-vencido.active { background: #ef4444; color: #000; border-color: #ef4444; }
        .status-saldado.active { background: #3b82f6; color: #fff; border-color: #3b82f6; }
        
        canvas { border: 2px dashed #334155; background: #111; touch-action: none; border-radius: 1rem; }
        .photo-preview { width: 60px; height: 60px; object-fit: cover; border-radius: 12px; border: 1px solid #D4AF37; }
        .btn-ruta.active { background: #D4AF37; color: black; font-weight: 900; }
        
        @media print {
            body * { visibility: hidden; }
            #ticket-printable, #ticket-printable * { visibility: visible; }
            #ticket-printable { position: absolute; left: 0; top: 0; width: 100%; color: black !important; }
        }

        .ticket-container { font-family: 'Courier New', Courier, monospace; color: #000; text-align: center; width: 100%; max-width: 300px; margin: 0 auto; padding: 10px; }
        .ticket-header { border-bottom: 1px dashed #000; padding-bottom: 10px; margin-bottom: 10px; }
        .ticket-title { font-weight: 900; font-size: 18px; margin: 0; text-transform: uppercase; }
        .ticket-body { text-align: left; font-size: 13px; margin: 15px 0; }
        .ticket-row { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .ticket-amount { background: #000; color: #fff !important; padding: 8px; text-align: center; font-size: 22px; font-weight: bold; margin: 15px 0; -webkit-print-color-adjust: exact; }
        .sig-img { width: 140px; margin: 10px auto; display: block; border-bottom: 1px solid #000; }
    </style>
</head>
<body class="font-sans min-h-screen pb-24">

<div id="login-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-black p-6">
    <div class="w-full max-w-sm text-center">
        <h1 class="text-3xl font-black text-gold uppercase mb-2 italic">Emanuel Perdomo</h1>
        <p class="text-[10px] tracking-[0.4em] mb-10 text-slate-400 uppercase italic">Sovereign Capital</p>
        <div class="space-y-4">
            <input type="text" id="user" placeholder="Usuario" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-800 outline-none text-center">
            <input type="password" id="pass" placeholder="Contraseña" class="w-full p-5 rounded-2xl bg-slate-900 border border-slate-800 outline-none text-center">
            <button onclick="login()" class="w-full p-5 bg-gold text-black font-extrabold rounded-2xl uppercase tracking-widest active:scale-95 transition-all">Entrar</button>
        </div>
    </div>
</div>

<div id="app-content" class="hidden">
    <header class="p-6 border-b border-slate-800 flex justify-between items-center sticky top-0 bg-black z-40">
        <div>
            <h2 class="font-black text-gold uppercase text-xl italic leading-none">SOVEREIGN</h2>
            <p class="text-[9px] text-slate-400 mt-1 uppercase italic">Hoy: <span id="daily-sum-head" class="text-white font-bold italic">RD$ 0</span></p>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleConfig()" class="bg-slate-800 p-3 rounded-xl">⚙️</button>
            <button onclick="document.getElementById('modal-registro').classList.remove('hidden')" class="bg-gold text-black p-3 rounded-xl font-bold shadow-lg">+</button>
        </div>
    </header>

    <div id="ruta-filter-container" class="p-4 bg-black flex gap-2 overflow-x-auto no-scrollbar sticky top-[80px] z-30"></div>

    <div class="px-4 pb-4 bg-black border-b border-slate-800 flex gap-2 sticky top-[145px] z-30 overflow-x-auto no-scrollbar">
        <button onclick="setStatusFilter('TODOS')" id="f-todos" class="btn-status active">Todos</button>
        <button onclick="setStatusFilter('ACTIVO')" id="f-activo" class="btn-status status-activo text-green-500">Activos</button>
        <button onclick="setStatusFilter('ATRASO')" id="f-atraso" class="btn-status status-atraso text-yellow-500">Atraso</button>
        <button onclick="setStatusFilter('VENCIDO')" id="f-vencido" class="btn-status status-vencido text-red-500">Vencidos</button>
        <button onclick="setStatusFilter('SALDADO')" id="f-saldado" class="btn-status status-saldado text-blue-500">Salientes</button>
    </div>

    <main class="p-4 space-y-6">
        <input type="text" id="search-bar" oninput="render()" placeholder="🔍 Buscar cliente..." class="w-full p-4 rounded-2xl bg-slate-900 border border-slate-800 text-sm outline-none">
        <div id="loan-list" class="space-y-4"></div>
    </main>

    <div id="modal-pago" class="hidden fixed inset-0 z-[110] bg-black/90 flex items-center justify-center p-6">
        <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 w-full max-w-sm text-center">
            <h3 class="text-gold font-black uppercase text-xs italic mb-4">Registrar Cobro</h3>
            <p id="pago-client-name" class="text-white font-bold mb-2"></p>
            <p id="pago-cuota-info" class="text-slate-400 text-[10px] mb-4"></p>
            <input type="number" id="pago-monto" class="w-full p-5 rounded-2xl bg-black border border-slate-800 text-center text-2xl font-bold text-white outline-none mb-4" placeholder="0.00">
            <button id="pago-confirm-btn" class="w-full p-4 bg-gold text-black font-black rounded-xl uppercase mb-2">Procesar Pago</button>
            <button onclick="closeModalPago()" class="w-full p-2 text-slate-500 text-xs uppercase">Cancelar</button>
        </div>
    </div>

    <div id="modal-registro" class="hidden fixed inset-0 z-50 bg-black p-4 overflow-y-auto">
        <div class="bg-slate-900 p-6 rounded-[2.5rem] border border-slate-800 space-y-4 max-w-md mx-auto mb-10">
            <h3 id="reg-title" class="text-gold font-black uppercase text-xs italic text-center underline">Nuevo Expediente</h3>
            <select id="c-ruta" class="w-full p-3 rounded-xl bg-black border border-slate-800 text-gold font-bold uppercase text-xs"></select>
            <input type="text" id="c-name" placeholder="Nombre completo" class="w-full p-3 rounded-xl bg-black border border-slate-800 outline-none text-sm">
            <input type="text" id="c-phone" placeholder="WhatsApp" class="w-full p-3 rounded-xl bg-black border border-slate-800 outline-none text-sm">
            <input type="text" id="c-address" placeholder="Dirección" class="w-full p-3 rounded-xl bg-black border border-slate-800 outline-none text-sm">
            <input type="text" id="c-business" placeholder="Negocio" class="w-full p-3 rounded-xl bg-black border border-slate-800 outline-none text-sm">
            <div class="grid grid-cols-2 gap-2">
                <input type="number" id="c-income" placeholder="Ingresos RD$" class="w-full p-3 rounded-xl bg-black border border-slate-800 outline-none text-sm">
                <input type="number" id="c-amount" placeholder="Préstamo RD$" class="w-full p-3 rounded-xl bg-black border border-slate-800 outline-none text-sm">
            </div>
            <div class="space-y-2">
                <div id="photo-preview-container" class="flex gap-2 overflow-x-auto py-1"></div>
                <button onclick="document.getElementById('c-photo-input').click()" class="w-full p-3 bg-slate-800 rounded-xl text-[10px] font-bold uppercase italic">📸 Fotos</button>
                <input type="file" id="c-photo-input" capture="camera" accept="image/*" class="hidden" onchange="handlePhotos(this)">
            </div>
            <canvas id="sig-canvas" width="300" height="150" class="w-full"></canvas>
            <button id="btn-save-loan" onclick="addLoan()" class="w-full p-4 bg-gold text-black font-black rounded-xl uppercase">Guardar</button>
            <button onclick="closeModalRegistro()" class="w-full p-2 text-slate-500 text-xs uppercase">Cancelar</button>
        </div>
    </div>

    <div id="modal-config" class="hidden fixed inset-0 z-50 bg-black p-6 overflow-y-auto">
        <div class="max-w-md mx-auto space-y-6">
            <h3 class="text-gold font-black uppercase italic">Configuración</h3>
            <button onclick="showReceiptsHistory()" class="w-full p-4 bg-slate-800 text-gold font-black rounded-xl uppercase text-xs italic border border-gold/30">🧾 Ver Todos los Recibos</button>
            <button onclick="exportData()" class="w-full p-4 bg-green-600 text-white font-black rounded-xl uppercase text-xs italic">💾 Exportar Backup</button>
            <div id="config-inputs" class="space-y-3 pt-4 border-t border-slate-800"></div>
            <button onclick="saveRutaNames()" class="w-full p-4 bg-gold text-black font-black rounded-2xl uppercase text-xs">Guardar Rutas</button>
            <button onclick="toggleConfig()" class="w-full p-4 text-slate-400 text-xs uppercase">Cerrar</button>
        </div>
    </div>

    <div id="modal-historial" class="hidden fixed inset-0 z-[130] bg-black p-6 overflow-y-auto">
        <div class="max-w-md mx-auto">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-gold font-black uppercase italic">Historial de Recibos</h3>
                <button onclick="document.getElementById('modal-historial').classList.add('hidden')" class="text-white text-xl">✕</button>
            </div>
            <div id="receipts-list" class="space-y-3"></div>
        </div>
    </div>
</div>

<div id="t-modal" class="hidden fixed inset-0 z-[120] bg-black/95 flex items-center justify-center p-4">
    <div class="bg-white text-black p-4 rounded-[2rem] w-full max-w-[340px]">
        <div id="ticket-printable"><div id="ticket-body"></div></div>
        <button onclick="window.print()" class="w-full p-4 bg-black text-white rounded-2xl mt-4 font-bold text-xs uppercase italic">🖨️ Imprimir</button>
        <button onclick="closeModal()" class="w-full p-3 text-slate-400 text-[10px] mt-2 font-bold uppercase">Cerrar</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('perdomo_db')) || [];
    let rutaNames = JSON.parse(localStorage.getItem('perdomo_rutas')) || ["RUTA 1", "RUTA 2", "RUTA 3", "RUTA 4", "RUTA 5", "RUTA 6"];
    let tempPhotos = [], rutaActual = 'TODOS', statusFilter = 'TODOS', renewingId = null;

    // Sesión
    function checkSession() {
        const last = localStorage.getItem('last_login_time');
        if (last && (Date.now() - parseInt(last)) / 3600000 < 2) showApp();
    }
    function login() {
        if(document.getElementById('user').value === "SR Perdomo" && document.getElementById('pass').value === "Perdomo21") {
            localStorage.setItem('last_login_time', Date.now().toString());
            showApp();
        }
    }
    function showApp() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app-content').classList.remove('hidden');
        initUI(); render(); updateStats();
    }
    window.onload = checkSession;

    // Status
    function getLoanStatus(loan) {
        if (loan.payments.length >= 13) return 'SALDADO';
        const now = Date.now();
        const MS_PER_WEEK = 604800000;
        const semanasTranscurridas = Math.floor((now - loan.startDate) / MS_PER_WEEK);
        if (semanasTranscurridas >= 13) return 'VENCIDO';
        const ultimoPagoTS = loan.payments.length > 0 ? loan.payments[loan.payments.length - 1].timestamp : loan.startDate;
        if ((now - ultimoPagoTS) / MS_PER_WEEK >= 3) return 'ATRASO';
        return 'ACTIVO';
    }

    // Pagos
    function openPayModal(id) {
        const l = db.find(x => x.id === id);
        document.getElementById('pago-client-name').innerText = l.name;
        document.getElementById('pago-cuota-info').innerText = `Cuota Normal: RD$ ${l.perWeek.toLocaleString()}`;
        document.getElementById('pago-monto').value = l.perWeek;
        document.getElementById('pago-confirm-btn').onclick = () => processFlexiblePay(l.id);
        document.getElementById('modal-pago').classList.remove('hidden');
    }
    function closeModalPago() { document.getElementById('modal-pago').classList.add('hidden'); }

    function processFlexiblePay(id) {
        const l = db.find(x => x.id === id);
        const monto = parseFloat(document.getElementById('pago-monto').value);
        if (!monto || monto <= 0) return;

        const numCuotas = Math.floor(monto / l.perWeek) || 1;
        const p = { pid: Date.now(), week: l.payments.length + 1, date: new Date().toLocaleDateString(), timestamp: Date.now(), amount: monto, cuotasPagadas: numCuotas };

        for(let i=0; i < numCuotas; i++) {
            if(l.payments.length < 13) {
                l.payments.push(i === 0 ? p : { ...p, pid: Date.now() + i, week: l.payments.length + 1, hidden: true });
            }
        }
        localStorage.setItem('perdomo_db', JSON.stringify(db));
        closeModalPago(); showTicket(l, p); render(); updateStats();
    }

    // LÓGICA DE RENOVACIÓN
    function openRenew(id) {
        const l = db.find(x => x.id === id);
        renewingId = id;
        const deudaPendiente = (13 - l.payments.length) * l.perWeek;
        
        document.getElementById('reg-title').innerText = "Renovar Préstamo";
        document.getElementById('c-name').value = l.name;
        document.getElementById('c-phone').value = l.phone;
        document.getElementById('c-address').value = l.address;
        document.getElementById('c-business').value = l.business;
        document.getElementById('c-amount').placeholder = `Se restará deuda: RD$ ${deudaPendiente}`;
        
        document.getElementById('btn-save-loan').innerText = "Procesar Renovación";
        document.getElementById('btn-save-loan').onclick = () => confirmRenew(deudaPendiente);
        document.getElementById('modal-registro').classList.remove('hidden');
    }

    function confirmRenew(deuda) {
        const nuevoMonto = parseFloat(document.getElementById('c-amount').value);
        if(!nuevoMonto || nuevoMonto <= deuda) return alert("El monto debe cubrir la deuda de RD$ " + deuda);
        
        const entregaEfectivo = nuevoMonto - deuda;
        alert(`RENOVACIÓN:\nNuevo Préstamo: RD$ ${nuevoMonto}\nMenos Deuda Anterior: RD$ ${deuda}\nENTREGAR AL CLIENTE: RD$ ${entregaEfectivo}`);
        
        // Eliminar el actual y crear el nuevo
        db = db.filter(x => x.id !== renewingId);
        addLoan();
    }

    function render() {
        const query = document.getElementById('search-bar').value.toUpperCase();
        const list = document.getElementById('loan-list');
        list.innerHTML = "";
        
        db.filter(l => l.name.includes(query) && (rutaActual === 'TODOS' || l.ruta === rutaActual))
          .filter(l => statusFilter === 'TODOS' || statusFilter === getLoanStatus(l))
          .forEach(l => {
            const status = getLoanStatus(l);
            let color = "#22c55e"; 
            if(status === 'ATRASO') color = "#eab308";
            if(status === 'VENCIDO') color = "#ef4444";
            if(status === 'SALDADO') color = "#3b82f6";

            list.innerHTML += `
            <div class="bg-slate-900 p-5 rounded-[2.5rem] border border-slate-800">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex gap-3">
                        <img src="${l.photos[0] || ''}" class="w-12 h-12 rounded-2xl object-cover bg-black">
                        <div>
                            <h4 class="font-black text-white text-xs uppercase italic">${l.name}</h4>
                            <span class="text-[8px] font-black px-2 py-0.5 rounded text-black uppercase" style="background-color: ${color}">${status}</span>
                        </div>
                    </div>
                    <div class="flex flex-col gap-2">
                        ${status !== 'SALDADO' ? `<button onclick="openPayModal(${l.id})" class="bg-white text-black font-black w-10 h-10 rounded-xl shadow-lg">✓</button>` : ''}
                        ${l.payments.length >= 10 ? `<button onclick="openRenew(${l.id})" class="bg-blue-600 text-white font-black px-3 py-2 rounded-xl text-[9px] uppercase italic">Renovar</button>` : ''}
                    </div>
                </div>
                <div class="grid grid-cols-13 gap-1 mb-4">
                    ${Array(13).fill().map((_, i) => {
                        const isPaid = i < l.payments.length;
                        return `<div class="h-6 rounded-sm flex items-center justify-center text-[8px] font-bold ${isPaid ? '' : 'bg-black border border-slate-800 text-slate-600'}" style="background-color: ${isPaid ? color : ''}; color: ${isPaid ? '#000' : ''}">${i + 1}</div>`
                    }).join('')}
                </div>
                <div class="flex justify-between items-center text-[9px] border-t border-slate-800 pt-3">
                    <button onclick="deleteClient(${l.id})" class="text-red-600 font-bold uppercase italic">Eliminar</button>
                    <span class="text-white font-black italic">Resta: RD$ ${((13 - l.payments.length) * l.perWeek).toLocaleString()}</span>
                </div>
            </div>`;
        });
    }

    function showTicket(loan, p) {
        const now = new Date();
        const hora = now.getHours() + ":" + (now.getMinutes() < 10 ? '0' : '') + now.getMinutes();
        document.getElementById('ticket-body').innerHTML = `
            <div class="ticket-container">
                <div class="ticket-header">
                    <h2 class="ticket-title">SOVEREIGN CAPITAL</h2>
                    <p class="ticket-info">RNC: 001-0000000-0 | Tel: (809) 000-0000</p>
                    <p class="ticket-info">Fecha: ${p.date} | Hora: ${hora}</p>
                </div>
                <div class="ticket-body">
                    <div class="ticket-row"><span>CLIENTE:</span> <b>${loan.name}</b></div>
                    <div class="ticket-row"><span>CUOTAS PAGADAS:</span> <b>${p.cuotasPagadas}</b></div>
                    <div class="ticket-row"><span>SEMANA:</span> <b>${loan.payments.length} DE 13</b></div>
                    <div class="ticket-amount">RD$ ${p.amount.toLocaleString()}</div>
                    <div class="ticket-row" style="justify-content: center; font-weight: bold;">RESTANTE: RD$ ${((13-loan.payments.length)*loan.perWeek).toLocaleString()}</div>
                </div>
                <img src="${loan.signature}" class="sig-img">
                <p style="font-size: 8px;">Firma del Cliente</p>
            </div>`;
        document.getElementById('t-modal').classList.remove('hidden');
    }

    function showReceiptsHistory() {
        const list = document.getElementById('receipts-list');
        list.innerHTML = "";
        let allPayments = [];
        db.forEach(l => { 
            l.payments.forEach(p => { 
                if(!p.hidden) allPayments.push({ ...p, clientName: l.name, clientId: l.id }); 
            }); 
        });
        allPayments.sort((a,b) => b.timestamp - a.timestamp).forEach(rp => {
            list.innerHTML += `
            <div class="bg-slate-900 p-4 rounded-2xl border border-slate-800 flex justify-between items-center">
                <div>
                    <p class="text-[10px] text-gold font-black uppercase italic">${rp.clientName}</p>
                    <p class="text-xs font-bold">RD$ ${rp.amount.toLocaleString()} - ${rp.date}</p>
                </div>
                <button onclick="deleteReceipt(${rp.clientId}, ${rp.pid})" class="text-red-500 text-[10px] font-bold">BORRAR</button>
            </div>`;
        });
        document.getElementById('modal-historial').classList.remove('hidden');
    }

    function deleteReceipt(cId, pId) {
        if(!confirm("¿Borrar recibo?")) return;
        const c = db.find(x => x.id === cId);
        c.payments = c.payments.filter(p => p.pid !== pId);
        localStorage.setItem('perdomo_db', JSON.stringify(db));
        showReceiptsHistory(); render(); updateStats();
    }

    function toggleConfig() { initUI(); document.getElementById('modal-config').classList.toggle('hidden'); }
    function initUI() {
        const filterCont = document.getElementById('ruta-filter-container');
        filterCont.innerHTML = `<button onclick="setRuta('TODOS')" class="btn-ruta active" id="btn-TODOS">TODOS</button>`;
        rutaNames.forEach(name => { 
            filterCont.innerHTML += `<button onclick="setRuta('${name}')" class="btn-ruta bg-slate-900 px-4 py-2 rounded-xl text-[10px] font-bold text-white uppercase" id="btn-${name}">${name}</button>`; 
        });
        document.getElementById('c-ruta').innerHTML = rutaNames.map(name => `<option value="${name}">${name}</option>`).join('');
        document.getElementById('config-inputs').innerHTML = rutaNames.map((name, i) => `<input type="text" id="edit-ruta-${i}" value="${name}" class="w-full p-3 rounded-xl bg-slate-900 border border-slate-800 text-sm uppercase">`).join('');
    }
    function setRuta(r) { rutaActual = r; document.querySelectorAll('.btn-ruta').forEach(b => b.classList.remove('active')); document.getElementById('btn-' + r).classList.add('active'); render(); }
    function setStatusFilter(s) { statusFilter = s; document.querySelectorAll('.btn-status').forEach(b => b.classList.remove('active')); document.getElementById('f-' + s.toLowerCase()).classList.add('active'); render(); }
    function updateStats() {
        const today = new Date().toLocaleDateString();
        let sum = 0; db.forEach(l => l.payments.forEach(p => { if(p.date === today) sum += p.amount; }));
        document.getElementById('daily-sum-head').innerText = "RD$ " + sum.toLocaleString();
    }
    function deleteClient(id) { if(confirm("¿Eliminar?")) { db = db.filter(x => x.id !== id); localStorage.setItem('perdomo_db', JSON.stringify(db)); render(); updateStats(); } }
    function closeModal() { document.getElementById('t-modal').classList.add('hidden'); }
    function closeModalRegistro() { 
        document.getElementById('modal-registro').classList.add('hidden'); 
        renewingId = null;
        document.getElementById('reg-title').innerText = "Nuevo Expediente";
        document.getElementById('btn-save-loan').innerText = "Guardar";
        document.getElementById('btn-save-loan').onclick = addLoan;
    }
    function saveRutaNames() {
        rutaNames = [];
        for(let i=0; i<6; i++) rutaNames.push(document.getElementById(`edit-ruta-${i}`).value.toUpperCase() || `RUTA ${i+1}`);
        localStorage.setItem('perdomo_rutas', JSON.stringify(rutaNames));
        location.reload();
    }
    function exportData() {
        const blob = new Blob([JSON.stringify(db)], {type: "application/json"});
        const link = document.createElement("a");
        link.href = URL.createObjectURL(blob);
        link.download = `Sovereign_Backup.json`;
        link.click();
    }

    // Firma
    const canvas = document.getElementById('sig-canvas');
    const ctx = canvas.getContext('2d');
    let drawing = false;
    const getPos = (e) => { const rect = canvas.getBoundingClientRect(); return { x: (e.touches ? e.touches[0].clientX : e.clientX) - rect.left, y: (e.touches ? e.touches[0].clientY : e.clientY) - rect.top }; };
    canvas.addEventListener('touchstart', (e) => { drawing = true; ctx.beginPath(); const pos = getPos(e); ctx.moveTo(pos.x, pos.y); e.preventDefault(); });
    canvas.addEventListener('touchmove', (e) => { if(!drawing) return; const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.strokeStyle = "#D4AF37"; ctx.lineWidth = 3; ctx.stroke(); e.preventDefault(); });
    window.addEventListener('touchend', () => drawing = false);

    function addLoan() {
        const name = document.getElementById('c-name').value;
        const amount = parseFloat(document.getElementById('c-amount').value);
        if(!name || isNaN(amount)) return alert("Faltan datos");
        db.push({
            id: Date.now(), name: name.toUpperCase(), phone: document.getElementById('c-phone').value,
            address: document.getElementById('c-address').value, business: document.getElementById('c-business').value.toUpperCase(),
            ruta: document.getElementById('c-ruta').value,
            total: amount, perWeek: (amount / 1000) * 100, startDate: Date.now(),
            photos: [...tempPhotos], signature: canvas.toDataURL(), payments: []
        });
        localStorage.setItem('perdomo_db', JSON.stringify(db));
        location.reload();
    }

    function handlePhotos(input) {
        if (input.files[0]) {
            const reader = new FileReader();
            reader.onload = (e) => { 
                tempPhotos.push(e.target.result); 
                document.getElementById('photo-preview-container').innerHTML = tempPhotos.map(p => `<img src="${p}" class="photo-preview">`).join('');
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
